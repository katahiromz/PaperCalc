<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自動筆算プログラム (PaperCalc)</title>
  <script src="util.js"></script>
  <script src="Paper.js"></script>
  <script src="AlgoBase.js"></script>
  <script src="AlgoAdd.js"></script>
  <script src="AlgoSub.js"></script>
  <script src="AlgoMul.js"></script>
  <script src="AlgoDiv.js"></script>
  <script src="AlgoTest.js"></script>
  <script src="main.js"></script>
  <link rel="stylesheet" type="text/css" href="main.css" />
</head>
<body>
  <header class="center">
    自動筆算プログラム PaperCalc
  </header>
  <div id="my-container">
    <div id="my-control-panel">
      <span class="no-wrap">
        <select id="my-select" disabled>
          <option value="add">足し算</option>
          <option value="sub">引き算</option>
          <option value="mul">掛け算</option>
          <option value="div">割り算</option>
          <option value="test">テスト</option>
        </select>
      </span>
      <span class="no-wrap">
        速度: <input type="range" id="my-speed-range" min="1" max="7" step="1" value="4" style="vertical-align: middle;" disabled />
        <span id="speed-label">5</span>
      </span>
      <br />
      <span class="no-wrap">
        <span id="label-a">数A</span>: <input type="text" id="my-text-a" value="111" size="4" maxlength="10" disabled />&nbsp;&nbsp;&nbsp;
      </span>
      <span class="no-wrap">
        <span id="label-b">数B</span>: <input type="text" id="my-text-b" value="99.1" size="4" maxlength="10" disabled />
      </span>
      <span id="my-accuracy" class="no-wrap hidden">
        <span id="label-c">小数点以下</span>: <input type="number" id="my-text-c" value="0" min="0" max="10" disabled />桁まで
      </span>
      <br />
      <div id="input-error-message"></div>
      <button id="my-start-button" disabled>再生 ▶</button>
      <button id="my-stop-button" disabled>停止 ■</button>
      <button id="my-next-step-button" disabled>1歩進む ＞</button>
      <button id="my-reset-button" disabled>リセット</button>
    </div>
    <div id="my-canvas-space">
      <canvas id="my-canvas" width="1" height="1"></canvas>
    </div>
    <div>
      <div id="my-textarea"></div>
    </div>
  </div>
  <footer class="center">
    &copy; 2026 katahiromz
  </footer>
</body>
</html>
